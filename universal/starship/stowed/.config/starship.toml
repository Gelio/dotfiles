"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

[time]
disabled = false

[git_metrics]
disabled = false

[directory]
# NOTE: show more directory levels than the default 3
truncation_length = 8
# NOTE: show truncated ancestor directories beyond the repository root.
# Most useful with nested git submodules to show more of the path
fish_style_pwd_dir_length = 1

[aws]
disabled = true

[azure]
disabled = true

[gcloud]
disabled = true
